apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/xander4234/agx/frontend:ea844719a3e3f6b1352f5eb6f7946cda4f84beae
          imagePullPolicy: Always
          ports:
            - containerPort: 80