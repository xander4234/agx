apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/xander4234/agx/frontend:61b8f48cd44c6f93dc31e30e8fb19fc013574bbf
          imagePullPolicy: Always
          ports:
            - containerPort: 80