apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/xander4234/agx/frontend:22181faa61b2d4bf20c440424edd4ce96c44ea9d
          imagePullPolicy: Always
          ports:
            - containerPort: 80