apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/xander4234/agx/frontend:f862fea1806984e255c7f4cb608783c5c0b2f88d
          imagePullPolicy: Always
          ports:
            - containerPort: 80