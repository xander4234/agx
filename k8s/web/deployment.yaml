apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/xander4234/agx/frontend:47a619a6d3ab07b7511509a030a2efafcaa6a8f4
          imagePullPolicy: Always
          ports:
            - containerPort: 80