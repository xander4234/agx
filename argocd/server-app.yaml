apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agx-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xander4234/agx
    targetRevision: HEAD
    path: k8s/server
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true