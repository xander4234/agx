name: Deploy Web AGX

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} ./web

      - name: Push frontend
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

      - name: Update deployment.yaml
        run: |
          sed -i "s|image: ghcr.io/.*/frontend:.*|image: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}|g" k8s/web/deployment.yaml

      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/web/deployment.yaml
          git commit -m "Update image to ${{ github.sha }}" || echo "No changes"
          git push