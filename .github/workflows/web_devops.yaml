name: Deploy Web AGX

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── FRONTEND ──────────────────────────────────────────
      - name: Build frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} ./web

      - name: Push frontend
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

      # ── BACKEND ───────────────────────────────────────────
      - name: Build server
        run: |
          docker build -t ghcr.io/${{ github.repository }}/server:${{ github.sha }} ./server

      - name: Push server
        run: |
          docker push ghcr.io/${{ github.repository }}/server:${{ github.sha }}

      # ── ACTUALIZAR K8S ────────────────────────────────────
      - name: Update deployment frontend
        run: |
          sed -i "s|image: ghcr.io/.*/frontend:.*|image: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}|g" k8s/web/deployment.yaml

      - name: Update deployment server
        run: |
          sed -i "s|image: ghcr.io/.*/server:.*|image: ghcr.io/${{ github.repository }}/server:${{ github.sha }}|g" k8s/server/deployment.yaml

      # ── COMMIT Y PUSH ─────────────────────────────────────
      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/web/deployment.yaml k8s/server/deployment.yaml
          git commit -m "ci: update images to ${{ github.sha }}" || echo "No changes"
          git push